project:
  name: minimal_adl_ethene_butadiene
  description: "ethene + 1,3-butadiene 的最小 active delta-learning 教学版实现"

paths:
  seed_geometry: geometries/seed/da_eqmol_seed.xyz
  geometry_pool_manifest: data/raw/geometry_pool_manifest.json
  initial_selection_manifest: data/raw/initial_selection_manifest.json
  delta_dataset_npz: data/processed/delta_dataset.npz
  delta_dataset_metadata: data/processed/delta_dataset_metadata.json
  xtb_labels_dir: labels/xtb
  gaussian_labels_dir: labels/gaussian
  models_dir: models
  logs_dir: logs
  results_dir: results

methods:
  baseline:
    label: baseline
    output_subdir: xtb
    method: GFN2-xTB
    program: null
    nthreads: 4
    save_files_in_current_directory: false
  target:
    label: target
    output_subdir: gaussian
    method: wB97X-D/6-31G*
    program: Gaussian
    nthreads: 8
    save_files_in_current_directory: false

sampling:
  default_pool_size: 400
  displacement_std_angstrom: 0.08
  max_abs_displacement_angstrom: 0.18
  random_seed: 20260324

training:
  ml_model_type: ANI
  device: cpu
  validation_set_fraction: 0.10
  model_name: delta_bundle
  main_model_stem: delta_main_model
  aux_model_stem: delta_aux_model
  summary_filename: training_summary.json
  state_filename: training_state.json

active_learning:
  initial_points: 250
  max_new_points_per_round: 100
  uncertainty_threshold: null
  threshold_metric: m+3mad
  convergence_ratio: 0.05
  random_seed: 20260324

cluster:
  scheduler: PBS
  submit_command: qsub
  queue: default
  nodes: 1
  ppn: 4
  walltime: 12:00:00
  conda_init: "source ~/.bashrc"
  conda_env: aiqm
  python_command: python
  poll_interval_seconds: 30
  poll_timeout_seconds: 86400
  resources_by_method:
    baseline:
      ppn: 4
      walltime: 01:00:00
    target:
      ppn: 8
      walltime: 24:00:00
