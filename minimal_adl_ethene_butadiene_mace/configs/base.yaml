project:
  name: minimal_adl_ethene_butadiene_mace
  description: "ethene + 1,3-butadiene 的最小 active delta-learning 教学版实现"

paths:
  seed_geometry: geometries/seed/da_eqmol_seed.xyz
  geometry_pool_manifest: data/raw/geometry_pool_manifest.json
  initial_selection_manifest: data/raw/initial_selection_manifest.json
  delta_dataset_npz: data/processed/delta_dataset.npz
  delta_dataset_metadata: data/processed/delta_dataset_metadata.json
  xtb_labels_dir: labels/xtb
  gaussian_labels_dir: labels/gaussian
  models_dir: models
  logs_dir: logs
  results_dir: results
  training_split_file: models/training_split.json
  train_main_predictions_file: models/train_main_predictions.csv
  train_aux_predictions_file: models/train_aux_predictions.csv
  train_main_history_file: models/train_main_history.json
  train_aux_history_file: models/train_aux_history.json
  training_diagnostics_file: models/training_diagnostics.json
  check_environment_report: results/check_environment_latest.json
  pipeline_run_summary: results/pipeline_run_summary.json

methods:
  baseline:
    label: baseline
    output_subdir: xtb
    method: GFN2-xTB
    program: null
    nthreads: 4
    save_files_in_current_directory: false
  target:
    label: target
    output_subdir: gaussian
    method: wB97X-D/6-31G*
    program: Gaussian
    nthreads: 8
    save_files_in_current_directory: false

sampling:
  default_pool_size: 400
  displacement_std_angstrom: 0.08
  max_abs_displacement_angstrom: 0.18
  random_seed: 20260324

training:
  ml_model_type: MACE
  device: cuda
  validation_set_fraction: 0.10
  model_name: delta_bundle
  main_model_stem: delta_main_model
  aux_model_stem: delta_aux_model
  summary_filename: training_summary.json
  state_filename: training_state.json

active_learning:
  initial_points: 250
  max_new_points_per_round: 100
  uncertainty_threshold: null
  threshold_metric: m+3mad
  convergence_ratio: 0.05
  random_seed: 20260324

cluster:
  scheduler: PBS
  submit_command: qsub
  queue: default
  nodes: 1
  ppn: 4
  walltime: 12:00:00
  conda_init: source ~/.bashrc
  conda_env: ADL_MACE
  python_command: python
  poll_interval_seconds: 30
  poll_timeout_seconds: 86400
  resources_by_method:
    baseline:
      # worker: 每个 PBS 作业认领一批样本，并在节点内继续并发执行。
      submission_strategy: worker
      queue: default
      nodes: 1
      ppn: 16
      walltime: 01:00:00
      worker_count: 8
      local_parallelism: 4
      extra_pbs_lines: []
    target:
      # 16 核节点上，Gaussian 默认按 2 并发来吃满 2 x 8 线程。
      submission_strategy: worker
      queue: default
      nodes: 1
      ppn: 16
      walltime: 24:00:00
      worker_count: 8
      local_parallelism: 2
      extra_pbs_lines: []
    training:
      queue: GPU
      nodes: 1
      ppn: 8
      walltime: 12:00:00
      # 如果机房以后要求额外 GPU 资源字段，可改成：
      # extra_pbs_lines:
      #   - "#PBS -l gpus=1"
      extra_pbs_lines: []
    uncertainty:
      queue: GPU
      nodes: 1
      ppn: 4
      walltime: 04:00:00
      extra_pbs_lines: []
  env_blocks:
    baseline:
      - source ~/.bashrc
      - conda activate ADL_MACE
      - export PATH=/share/apps/xtb-6.7.1/xtb-dist/bin:$PATH
      - 'echo "Python path: $(which python)"'
      - 'echo "xTB path: $(which xtb)"'
    target:
      - export PERLLIB="${PERLLIB-}"
      - set +e
      - set +u
      - set +o pipefail
      - source /share/apps/gaussian/g16-env.sh
      - g16_env_rc=$?
      - source /share/env/ips2018u1.env
      - ips_env_rc=$?
      - set -e
      - set -u
      - set -o pipefail
      - source ~/.bashrc
      - conda activate ADL_MACE
      - export PATH=/share/apps/gaussian/g16:/share/pubbin:/share/home/Chenlehui/bin:/share/apps/xtb-6.7.1/xtb-dist/bin:$PATH
      - export dftd4bin=/share/apps/dftd4-3.5.0/bin/dftd4
      - export GAUSS_SCRDIR=/tmp/${USER:-${LOGNAME:-unknown_user}}/${PBS_JOBID:-unknown_job}
      - mkdir -p "$GAUSS_SCRDIR"
      - 'echo "g16-env.sh return code: ${g16_env_rc:-0}"'
      - 'echo "ips2018u1.env return code: ${ips_env_rc:-0}"'
      - 'command -v g16 >/dev/null || { echo "g16 not found after sourcing Gaussian env" >&2; exit 1; }'
      - '[ -n "${GAUSS_EXEDIR:-}" ] || { echo "GAUSS_EXEDIR is not set after sourcing Gaussian env" >&2; exit 1; }'
      - 'echo "Python path: $(which python)"'
      - 'echo "xTB path: $(which xtb)"'
      - 'echo "GAUSS_SCRDIR: $GAUSS_SCRDIR"'
    training:
      - source ~/.bashrc
      - conda activate ADL_MACE
      - export TORCH_FORCE_NO_WEIGHTS_ONLY_LOAD=1
      - 'echo "Python path: $(which python)"'
      - nvidia-smi || true
    uncertainty:
      - source ~/.bashrc
      - conda activate ADL_MACE
      - export TORCH_FORCE_NO_WEIGHTS_ONLY_LOAD=1
      - 'echo "Python path: $(which python)"'
      - nvidia-smi || true
  cleanup_blocks:
    target:
      - if [ -n "${GAUSS_SCRDIR:-}" ] && [ "$GAUSS_SCRDIR" != "/" ] && [ "$GAUSS_SCRDIR" != "/tmp" ] && [ "$GAUSS_SCRDIR" != "/tmp/" ] && [ -d "$GAUSS_SCRDIR" ]; then rm -rf "$GAUSS_SCRDIR"; fi


